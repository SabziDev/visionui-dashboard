<!doctype html>

<html lang="en" dir="ltr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <meta name="theme-color" content="#0075ff" />
    <link rel="icon" type="image/webp" href="./app-favicon.webp" />

    <style>
      #app-preloader,
      #preloader {
        display: flex;
        align-items: center;
        justify-content: center;
        position: fixed;
        inset: 0;
        background-color: #060b26;
        z-index: 9999;
      }
      .app-preloader__pulse,
      .preloader__pulse {
        width: 100px;
        height: 100px;
        margin: 100px auto;
        border-radius: 100%;
        background-color: #0075ff;
        opacity: 0.8;
        animation: preloader-pulse 1.8s infinite ease-in-out;
      }

      @keyframes preloader-pulse {
        0% {
          transform: scale(0);
        }
        100% {
          transform: scale(1);
          opacity: 0;
        }
      }
    </style>

    <link rel="stylesheet" href="./src/input.css" />
  </head>

  <!-- TODO Add overflow-x-hidden after final responsive -->
  <body class="bg-navy text-white font-VazirRegular overflow-hidden">
    <div id="app-preloader">
      <div class="app-preloader__pulse"></div>
    </div>

    <!--? ============================================= -- React App -- =============================================  -->
    <div id="root"></div>
    <!--? ============================================= -- React App -- =============================================  -->

    <script src="./src/main.jsx" type="module"></script>
  </body>
</html>
